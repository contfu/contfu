name: Build and Push
on:
  push:
    branches:
      - main
env:
  IMAGE_NAME: contfu-app
  REGISTRY: registry.sven-rogge.com
jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep '"version"' packages/service/app/package.json | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/')
          echo "app-version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Install Docker CLI
        run: apt-get update -qq && apt-get install -y -qq docker.io

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.service
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/contfu/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.app-version }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/contfu/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/contfu/${{ env.IMAGE_NAME }}:buildcache,mode=max

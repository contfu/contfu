name: Test and Build

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Generate SvelteKit types
        run: |
          for dir in packages/service/app packages/client/app demos/consumer-app; do
            (cd $dir && bun svelte-kit sync)
          done

      - name: Lint (type-aware)
        run: bun run lint:types

      - name: Run unit tests
        run: bun run test

  e2e:
    name: Build & E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      packages: read

    # Run job in a container to enable automatic service networking
    container:
      image: registry.sven-rogge.com/contfu/ci-runner:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.REGISTRY_TOKEN }}

    services:
      nats:
        image: registry.sven-rogge.com/contfu/nats-jetstream:latest

    env:
      E2E_FULL_FLOW: true
      NATS_SERVER: nats://nats:4222
      CI: true
      PLAYWRIGHT_BROWSERS_PATH: /opt/ms-playwright

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build

      - name: Build consumer demo app
        run: bun run build
        working-directory: demos/consumer-app

      - name: Run E2E tests
        run: bun run test:e2e:no-build --reporter=list
        env:
          PLAYWRIGHT_HTML_OPEN: never

  build:
    name: Build Docker image
    timeout-minutes: 8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Docker CLI
        run: apt-get update -qq && apt-get install -y -qq docker.io
      - run: docker build .

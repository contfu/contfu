name: Test and Build

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container:
      image: forgejo.rogge.vip/contfu/ci-runner:latest
      volumes:
        - /Users/jimbo/.bun:/root/.bun
    services:
      strapi:
        image: forgejo.rogge.vip/contfu/strapi-test:v2
        env:
          NODE_ENV: development
          HOST: 0.0.0.0
          PORT: 1337
          APP_KEYS: testkey1,testkey2
          API_TOKEN_SALT: testsalt1
          ADMIN_JWT_SECRET: testsecret1
          TRANSFER_TOKEN_SALT: testsalt2
          JWT_SECRET: testsecret2
    env:
      E2E_FULL_FLOW: true
      STRAPI_HOST: strapi
      CI: true
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Lint
        run: bun run lint
      - name: Type check
        run: bun run typecheck
      - name: Build all packages
        run: bun run build
      - name: Build consumer demo app
        run: bun run build
        working-directory: demos/consumer-app
      - name: Run unit tests
        run: bun run test
      - name: Wait for Strapi
        run: |
          echo "Waiting for Strapi..."
          for i in $(seq 1 60); do
            if curl -sf http://strapi:1337/_health > /dev/null 2>&1; then
              echo "Strapi is ready!"
              exit 0
            fi
            echo "Waiting... ($i/60)"
            sleep 2
          done
          echo "Strapi failed to start"
          exit 1
      - name: Run E2E tests
        run: DEBUG=pw:api bun run test:e2e --reporter=list
        env:
          PWDEBUG: 0

  build:
    name: Build image
    runs-on: native
    steps:
      - run: apk add --no-cache nodejs docker-cli
      - uses: actions/checkout@v4
      - run: docker build .

name: Test and Build

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      packages: read
    container:
      image: registry.sven-rogge.com/contfu/ci-runner:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.REGISTRY_TOKEN }}
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: ./scripts/retry-timeout.sh --timeout 60 --retries 3 -- bun install --frozen-lockfile --ignore-scripts

      - name: Generate SvelteKit types
        run: |
          for dir in packages/service/app packages/ui; do
            (cd $dir && bun svelte-kit sync)
          done

      - name: Typecheck (tsc)
        run: bun run typecheck

      - name: Lint (type-aware)
        run: bun run lint:types

      - name: Run unit tests
        run: bun run test

  e2e:
    name: Build & E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      packages: read

    # Run job in a container to enable automatic service networking
    container:
      image: registry.sven-rogge.com/contfu/ci-runner:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.REGISTRY_TOKEN }}

    env:
      E2E_FULL_FLOW: true
      NATS_SERVER: nats://localhost:4222
      CI: true
      PLAYWRIGHT_BROWSERS_PATH: /opt/ms-playwright

    steps:
      - uses: actions/checkout@v4

      - name: Start NATS JetStream
        run: |
          if ! command -v nats-server &>/dev/null; then
            echo "nats-server not found in CI runner image, downloading..."
            curl -fsSL https://github.com/nats-io/nats-server/releases/download/v2.12.5/nats-server-v2.12.5-linux-amd64.tar.gz -o /tmp/nats.tar.gz
            tar xzf /tmp/nats.tar.gz -C /tmp
            export PATH="/tmp/nats-server-v2.12.5-linux-amd64:$PATH"
          fi
          nats-server --jetstream --store_dir /tmp/nats -p 4222 -m 8222 &
          for i in 1 2 3 4 5; do
            sleep 1
            if curl -sf http://localhost:8222/healthz &>/dev/null; then
              echo "NATS JetStream is ready"
              exit 0
            fi
          done
          echo "ERROR: NATS failed to start"
          exit 1

      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock', '**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: ./scripts/retry-timeout.sh --timeout 60 --retries 3 -- bun install --frozen-lockfile --ignore-scripts

      - name: Ensure Playwright Chromium is available
        run: |
          EXPECTED_BROWSER="$(node -e "console.log(require('playwright').chromium.executablePath())")"
          if [ -x "$EXPECTED_BROWSER" ]; then
            echo "Using preinstalled Playwright browser at $EXPECTED_BROWSER"
            exit 0
          fi

          echo "Playwright browser missing at $EXPECTED_BROWSER"
          echo "Installing Chromium into $PLAYWRIGHT_BROWSERS_PATH"
          bunx playwright install chromium

      - name: Build all packages
        run: NODE_ENV=test bun run build

      - name: Run E2E tests
        run: bun run test:e2e:no-build --reporter=list
        env:
          PLAYWRIGHT_HTML_OPEN: never

      - name: Run service app E2E tests
        run: bun run test:svc-e2e:no-build --reporter=list
        env:
          PLAYWRIGHT_HTML_OPEN: never
          NATS_SERVER: nats://localhost:4222

  build-docker:
    name: Build Docker images
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Docker CLI
        run: apt-get update -qq && apt-get install -y -qq docker.io
      - name: Build service image
        run: docker build -f docker/Dockerfile.service .
      - name: Build UI image
        run: docker build -f docker/Dockerfile.ui .
      - name: Build server image
        run: docker build -f docker/Dockerfile.server .

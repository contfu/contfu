{{- if .Values.postgresql.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "contfu.postgresql.fullname" . }}
  labels:
    {{- include "contfu.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.postgresql.instances }}
  imageName: {{ .Values.postgresql.imageName }}

  bootstrap:
    initdb:
      database: {{ .Values.postgresql.database }}
      owner: {{ .Values.postgresql.owner }}
      postInitSQL:
        - ALTER ROLE {{ .Values.postgresql.owner }} CREATEROLE
        - CREATE ROLE "app_user"
        - CREATE ROLE "service_role"
        - GRANT "app_user" TO {{ .Values.postgresql.owner }}
        - GRANT "service_role" TO {{ .Values.postgresql.owner }}
        - GRANT USAGE ON SCHEMA public TO "app_user", "service_role"
        - ALTER DEFAULT PRIVILEGES FOR ROLE {{ .Values.postgresql.owner }} IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO "app_user", "service_role"
        - ALTER DEFAULT PRIVILEGES FOR ROLE {{ .Values.postgresql.owner }} IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO "app_user", "service_role"

  storage:
    size: {{ .Values.postgresql.storage.size }}
    {{- if .Values.postgresql.storage.storageClass }}
    storageClassName: {{ .Values.postgresql.storage.storageClass }}
    {{- end }}

  {{- with .Values.postgresql.resources }}
  resources:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  {{- if .Values.postgresql.monitoring.enabled }}
  monitoring:
    enablePodMonitor: true
  {{- end }}
{{- end }}

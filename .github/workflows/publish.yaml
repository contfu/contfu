name: Publish

on:
  push:
    branches:
      - main

jobs:
  check-version:
    name: Check if version changed
    runs-on: ubuntu-latest
    outputs:
      core-changed: ${{ steps.check.outputs.core-changed }}
      connect-changed: ${{ steps.check.outputs.connect-changed }}
      contfu-changed: ${{ steps.check.outputs.contfu-changed }}
      client-changed: ${{ steps.check.outputs.client-changed }}
      server-changed: ${{ steps.check.outputs.server-changed }}
      bun-file-store-changed: ${{ steps.check.outputs.bun-file-store-changed }}
      media-optimizer-changed: ${{ steps.check.outputs.media-optimizer-changed }}
      media-optimizer-remote-changed: ${{ steps.check.outputs.media-optimizer-remote-changed }}
      svc-core-changed: ${{ steps.check.outputs.svc-core-changed }}
      cli-changed: ${{ steps.check.outputs.cli-changed }}
      ui-changed: ${{ steps.check.outputs.ui-changed }}
      ui-version: ${{ steps.check.outputs.ui-version }}
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check if package.json version changed
        id: check
        shell: bash
        run: |
          function get_version() {
            local package_path=$1
            if [ -f "$package_path" ]; then
              jq -r .version "$package_path" || echo "0.0.0"
            else
              echo "0.0.0"
            fi
          }

          CURRENT_CORE_VERSION=$(get_version "packages/core/package.json")
          CURRENT_CONNECT_VERSION=$(get_version "packages/connect/package.json")
          CURRENT_CONTFU_VERSION=$(get_version "packages/contfu/package.json")
          CURRENT_CLIENT_VERSION=$(get_version "packages/client/package.json")
          CURRENT_SERVER_VERSION=$(get_version "packages/server/package.json")
          CURRENT_BUN_FILE_STORE_VERSION=$(get_version "packages/media/bun-file-store/package.json")
          CURRENT_MEDIA_OPTIMIZER_VERSION=$(get_version "packages/media/media-optimizer/package.json")
          CURRENT_MEDIA_OPTIMIZER_REMOTE_VERSION=$(get_version "packages/media/media-optimizer-remote/package.json")
          CURRENT_SVC_CORE_VERSION=$(get_version "packages/service/core/package.json")
          CURRENT_CLI_VERSION=$(get_version "packages/cli/package.json")
          CURRENT_UI_VERSION=$(get_version "packages/ui/package.json")

          git checkout HEAD^

          PREVIOUS_CORE_VERSION=$(get_version "packages/core/package.json")
          PREVIOUS_CONNECT_VERSION=$(get_version "packages/connect/package.json")
          PREVIOUS_CONTFU_VERSION=$(get_version "packages/contfu/package.json")
          PREVIOUS_CLIENT_VERSION=$(get_version "packages/client/package.json")
          PREVIOUS_SERVER_VERSION=$(get_version "packages/server/package.json")
          PREVIOUS_BUN_FILE_STORE_VERSION=$(get_version "packages/media/bun-file-store/package.json")
          PREVIOUS_MEDIA_OPTIMIZER_VERSION=$(get_version "packages/media/media-optimizer/package.json")
          PREVIOUS_MEDIA_OPTIMIZER_REMOTE_VERSION=$(get_version "packages/media/media-optimizer-remote/package.json")
          PREVIOUS_SVC_CORE_VERSION=$(get_version "packages/service/core/package.json")
          PREVIOUS_CLI_VERSION=$(get_version "packages/cli/package.json")
          PREVIOUS_UI_VERSION=$(get_version "packages/ui/package.json")

          function check_changed() {
            local name=$1 current=$2 previous=$3 publish_npm=$4
            local changed=$([ "$current" != "$previous" ] && echo "true" || echo "false")
            if [ "$changed" = "true" ] && [ "$publish_npm" = "true" ]; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
            echo "${name}-changed=$changed" >> "$GITHUB_OUTPUT"
          }

          check_changed "core" "$CURRENT_CORE_VERSION" "$PREVIOUS_CORE_VERSION" "true"
          check_changed "connect" "$CURRENT_CONNECT_VERSION" "$PREVIOUS_CONNECT_VERSION" "true"
          check_changed "contfu" "$CURRENT_CONTFU_VERSION" "$PREVIOUS_CONTFU_VERSION" "true"
          check_changed "client" "$CURRENT_CLIENT_VERSION" "$PREVIOUS_CLIENT_VERSION" "true"
          check_changed "server" "$CURRENT_SERVER_VERSION" "$PREVIOUS_SERVER_VERSION" "true"
          check_changed "bun-file-store" "$CURRENT_BUN_FILE_STORE_VERSION" "$PREVIOUS_BUN_FILE_STORE_VERSION" "true"
          check_changed "media-optimizer" "$CURRENT_MEDIA_OPTIMIZER_VERSION" "$PREVIOUS_MEDIA_OPTIMIZER_VERSION" "true"
          check_changed "media-optimizer-remote" "$CURRENT_MEDIA_OPTIMIZER_REMOTE_VERSION" "$PREVIOUS_MEDIA_OPTIMIZER_REMOTE_VERSION" "true"
          check_changed "svc-core" "$CURRENT_SVC_CORE_VERSION" "$PREVIOUS_SVC_CORE_VERSION" "true"
          check_changed "cli" "$CURRENT_CLI_VERSION" "$PREVIOUS_CLI_VERSION" "true"
          check_changed "ui" "$CURRENT_UI_VERSION" "$PREVIOUS_UI_VERSION" "false"
          echo "ui-version=$CURRENT_UI_VERSION" >> "$GITHUB_OUTPUT"
  build-npm:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: ./scripts/retry-timeout.sh --timeout 60 --retries 3 -- bun install --frozen-lockfile
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: bun run build
      - name: Publish @contfu/core
        if: needs.check-version.outputs.core-changed == 'true'
        working-directory: ./packages/core
        run: bun pm pack && npm publish *.tgz --access public --provenance
      - name: Publish @contfu/connect
        if: needs.check-version.outputs.connect-changed == 'true'
        working-directory: ./packages/connect
        run: bun pm pack && npm publish *.tgz --access public --provenance
      - name: Publish @contfu/contfu
        if: needs.check-version.outputs.contfu-changed == 'true'
        working-directory: ./packages/contfu
        run: bun pm pack && npm publish *.tgz --access public --provenance
      - name: Publish @contfu/client
        if: needs.check-version.outputs.client-changed == 'true'
        working-directory: ./packages/client
        run: bun pm pack && npm publish *.tgz --access public --provenance
      - name: Publish @contfu/server
        if: needs.check-version.outputs.server-changed == 'true'
        working-directory: ./packages/server
        run: bun pm pack && npm publish *.tgz --access public --provenance
      - name: Publish @contfu/bun-file-store
        if: needs.check-version.outputs.bun-file-store-changed == 'true'
        working-directory: ./packages/media/bun-file-store
        run: bun pm pack && npm publish *.tgz --access public --provenance
      - name: Publish @contfu/media-optimizer
        if: needs.check-version.outputs.media-optimizer-changed == 'true'
        working-directory: ./packages/media/media-optimizer
        run: bun pm pack && npm publish *.tgz --access public --provenance
      - name: Publish @contfu/media-optimizer-remote
        if: needs.check-version.outputs.media-optimizer-remote-changed == 'true'
        working-directory: ./packages/media/media-optimizer-remote
        run: bun pm pack && npm publish *.tgz --access public --provenance
      - name: Publish @contfu/svc-core
        if: needs.check-version.outputs.svc-core-changed == 'true'
        working-directory: ./packages/service/core
        run: bun pm pack && npm publish *.tgz --access public --provenance
      - name: Publish @contfu/cli
        if: needs.check-version.outputs.cli-changed == 'true'
        working-directory: ./packages/cli
        run: bun pm pack && npm publish *.tgz --access public --provenance

  push-ui:
    needs: check-version
    runs-on: ubuntu-latest
    if: needs.check-version.outputs.ui-changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push UI image
        uses: docker/build-push-action@v7
        with:
          file: docker/Dockerfile.ui
          push: true
          platforms: linux/amd64,linux/arm64
          tags: contfu/client:latest,contfu/client:${{ needs.check-version.outputs.ui-version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

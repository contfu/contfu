name: Publish

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-version:
    name: Check if version published
    runs-on: ubuntu-latest
    outputs:
      core-npm-changed: ${{ steps.check.outputs.core-npm-changed }}
      connect-npm-changed: ${{ steps.check.outputs.connect-npm-changed }}
      contfu-npm-changed: ${{ steps.check.outputs.contfu-npm-changed }}
      client-npm-changed: ${{ steps.check.outputs.client-npm-changed }}
      server-npm-changed: ${{ steps.check.outputs.server-npm-changed }}
      bun-file-store-npm-changed: ${{ steps.check.outputs.bun-file-store-npm-changed }}
      media-optimizer-npm-changed: ${{ steps.check.outputs.media-optimizer-npm-changed }}
      media-optimizer-remote-npm-changed: ${{ steps.check.outputs.media-optimizer-remote-npm-changed }}
      svc-core-npm-changed: ${{ steps.check.outputs.svc-core-npm-changed }}
      svc-api-npm-changed: ${{ steps.check.outputs.svc-api-npm-changed }}
      cli-npm-changed: ${{ steps.check.outputs.cli-npm-changed }}
      ui-npm-changed: ${{ steps.check.outputs.ui-npm-changed }}
      server-docker-changed: ${{ steps.check.outputs.server-docker-changed }}
      ui-docker-changed: ${{ steps.check.outputs.ui-docker-changed }}
      server-version: ${{ steps.check.outputs.server-version }}
      ui-version: ${{ steps.check.outputs.ui-version }}
      npm-changed: ${{ steps.check.outputs.npm-changed }}
      docker-changed: ${{ steps.check.outputs.docker-changed }}
    steps:
      - uses: actions/checkout@v4
      - name: Check if version published
        id: check
        shell: bash
        run: |
          function get_version() {
            local package_path=$1
            if [ -f "$package_path" ]; then
              jq -r .version "$package_path" || echo "0.0.0"
            else
              echo "0.0.0"
            fi
          }

          function get_npm_version() {
            npm view "$1" version 2>/dev/null || echo "0.0.0"
          }

          function get_dockerhub_version() {
            local image=$1 tag=$2
            local status
            status=$(curl -s -o /dev/null -w "%{http_code}" "https://hub.docker.com/v2/repositories/${image}/tags/${tag}/")
            [ "$status" = "200" ] && echo "$tag" || echo "0.0.0"
          }

          function check_changed() {
            local name=$1 current=$2 published=$3 aggregate=$4
            local changed=$([ "$current" != "$published" ] && echo "true" || echo "false")
            if [ "$changed" = "true" ]; then
              echo "${aggregate}-changed=true" >> "$GITHUB_OUTPUT"
            fi
            echo "${name}-changed=$changed" >> "$GITHUB_OUTPUT"
          }

          CURRENT_CORE_VERSION=$(get_version "packages/core/package.json")
          CURRENT_CONNECT_VERSION=$(get_version "packages/connect/package.json")
          CURRENT_CONTFU_VERSION=$(get_version "packages/contfu/package.json")
          CURRENT_CLIENT_VERSION=$(get_version "packages/client/package.json")
          CURRENT_SERVER_VERSION=$(get_version "packages/server/package.json")
          CURRENT_BUN_FILE_STORE_VERSION=$(get_version "packages/media/bun-file-store/package.json")
          CURRENT_MEDIA_OPTIMIZER_VERSION=$(get_version "packages/media/media-optimizer/package.json")
          CURRENT_MEDIA_OPTIMIZER_REMOTE_VERSION=$(get_version "packages/media/media-optimizer-remote/package.json")
          CURRENT_SVC_CORE_VERSION=$(get_version "packages/service/core/package.json")
          CURRENT_SVC_API_VERSION=$(get_version "packages/service/api/package.json")
          CURRENT_CLI_VERSION=$(get_version "packages/cli/package.json")
          CURRENT_UI_VERSION=$(get_version "packages/ui/package.json")

          PUBLISHED_CORE_NPM=$(get_npm_version "@contfu/core")
          PUBLISHED_CONNECT_NPM=$(get_npm_version "@contfu/connect")
          PUBLISHED_CONTFU_NPM=$(get_npm_version "@contfu/contfu")
          PUBLISHED_CLIENT_NPM=$(get_npm_version "@contfu/client")
          PUBLISHED_SERVER_NPM=$(get_npm_version "@contfu/server")
          PUBLISHED_BUN_FILE_STORE_NPM=$(get_npm_version "@contfu/bun-file-store")
          PUBLISHED_MEDIA_OPTIMIZER_NPM=$(get_npm_version "@contfu/media-optimizer")
          PUBLISHED_MEDIA_OPTIMIZER_REMOTE_NPM=$(get_npm_version "@contfu/media-optimizer-remote")
          PUBLISHED_SVC_CORE_NPM=$(get_npm_version "@contfu/svc-core")
          PUBLISHED_SVC_API_NPM=$(get_npm_version "@contfu/svc-api")
          PUBLISHED_CLI_NPM=$(get_npm_version "@contfu/cli")
          PUBLISHED_UI_NPM=$(get_npm_version "@contfu/ui")

          PUBLISHED_SERVER_DOCKER=$(get_dockerhub_version "contfu/server" "$CURRENT_SERVER_VERSION")
          PUBLISHED_UI_DOCKER=$(get_dockerhub_version "contfu/client" "$CURRENT_UI_VERSION")

          check_changed "core-npm"                   "$CURRENT_CORE_VERSION"                   "$PUBLISHED_CORE_NPM"                   "npm"
          check_changed "connect-npm"                "$CURRENT_CONNECT_VERSION"                "$PUBLISHED_CONNECT_NPM"                "npm"
          check_changed "contfu-npm"                 "$CURRENT_CONTFU_VERSION"                 "$PUBLISHED_CONTFU_NPM"                 "npm"
          check_changed "client-npm"                 "$CURRENT_CLIENT_VERSION"                 "$PUBLISHED_CLIENT_NPM"                 "npm"
          check_changed "server-npm"                 "$CURRENT_SERVER_VERSION"                 "$PUBLISHED_SERVER_NPM"                 "npm"
          check_changed "bun-file-store-npm"         "$CURRENT_BUN_FILE_STORE_VERSION"         "$PUBLISHED_BUN_FILE_STORE_NPM"         "npm"
          check_changed "media-optimizer-npm"        "$CURRENT_MEDIA_OPTIMIZER_VERSION"        "$PUBLISHED_MEDIA_OPTIMIZER_NPM"        "npm"
          check_changed "media-optimizer-remote-npm" "$CURRENT_MEDIA_OPTIMIZER_REMOTE_VERSION" "$PUBLISHED_MEDIA_OPTIMIZER_REMOTE_NPM" "npm"
          check_changed "svc-core-npm"               "$CURRENT_SVC_CORE_VERSION"               "$PUBLISHED_SVC_CORE_NPM"               "npm"
          check_changed "svc-api-npm"                "$CURRENT_SVC_API_VERSION"                "$PUBLISHED_SVC_API_NPM"                "npm"
          check_changed "cli-npm"                    "$CURRENT_CLI_VERSION"                    "$PUBLISHED_CLI_NPM"                    "npm"
          check_changed "ui-npm"                     "$CURRENT_UI_VERSION"                     "$PUBLISHED_UI_NPM"                     "npm"
          check_changed "server-docker"              "$CURRENT_SERVER_VERSION"                 "$PUBLISHED_SERVER_DOCKER"              "docker"
          check_changed "ui-docker"                  "$CURRENT_UI_VERSION"                     "$PUBLISHED_UI_DOCKER"                  "docker"

          echo "server-version=$CURRENT_SERVER_VERSION" >> "$GITHUB_OUTPUT"
          echo "ui-version=$CURRENT_UI_VERSION" >> "$GITHUB_OUTPUT"

  publish-npm:
    needs: check-version
    if: needs.check-version.outputs.npm-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: ./scripts/retry-timeout.sh --timeout 60 --retries 3 -- bun install --frozen-lockfile
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: bun run build
      - name: Publish @contfu/core
        if: needs.check-version.outputs.core-npm-changed == 'true'
        working-directory: ./packages/core
        run: bun run pack && npm publish *.tgz --access public --provenance
      - name: Publish @contfu/connect
        if: needs.check-version.outputs.connect-npm-changed == 'true'
        working-directory: ./packages/connect
        run: bun run pack && npm publish *.tgz --access public --provenance
      - name: Publish @contfu/contfu
        if: needs.check-version.outputs.contfu-npm-changed == 'true'
        working-directory: ./packages/contfu
        run: bun run pack && npm publish *.tgz --access public --provenance
      - name: Publish @contfu/client
        if: needs.check-version.outputs.client-npm-changed == 'true'
        working-directory: ./packages/client
        run: bun run pack && npm publish *.tgz --access public --provenance
      - name: Publish @contfu/server
        if: needs.check-version.outputs.server-npm-changed == 'true'
        working-directory: ./packages/server
        run: bun run pack && npm publish *.tgz --access public --provenance
      - name: Publish @contfu/bun-file-store
        if: needs.check-version.outputs.bun-file-store-npm-changed == 'true'
        working-directory: ./packages/media/bun-file-store
        run: bun run pack && npm publish *.tgz --access public --provenance
      - name: Publish @contfu/media-optimizer
        if: needs.check-version.outputs.media-optimizer-npm-changed == 'true'
        working-directory: ./packages/media/media-optimizer
        run: bun run pack && npm publish *.tgz --access public --provenance
      - name: Publish @contfu/media-optimizer-remote
        if: needs.check-version.outputs.media-optimizer-remote-npm-changed == 'true'
        working-directory: ./packages/media/media-optimizer-remote
        run: bun run pack && npm publish *.tgz --access public --provenance
      - name: Publish @contfu/svc-core
        if: needs.check-version.outputs.svc-core-npm-changed == 'true'
        working-directory: ./packages/service/core
        run: bun run pack && npm publish *.tgz --access public --provenance
      - name: Publish @contfu/svc-api
        if: needs.check-version.outputs.svc-api-npm-changed == 'true'
        working-directory: ./packages/service/api
        run: bun run pack && npm publish *.tgz --access public --provenance
      - name: Publish @contfu/cli
        if: needs.check-version.outputs.cli-npm-changed == 'true'
        working-directory: ./packages/cli
        run: bun run pack && npm publish *.tgz --access public --provenance
      - name: Publish @contfu/ui
        if: needs.check-version.outputs.ui-npm-changed == 'true'
        working-directory: ./packages/ui
        run: bun run pack && npm publish *.tgz --access public --provenance

  publish-docker:
    needs: check-version
    runs-on: ubuntu-latest
    if: needs.check-version.outputs.docker-changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push server image
        if: needs.check-version.outputs.server-docker-changed == 'true'
        uses: docker/build-push-action@v7
        with:
          file: docker/Dockerfile.server
          push: true
          platforms: linux/amd64,linux/arm64
          tags: contfu/server:latest,contfu/server:${{ needs.check-version.outputs.server-version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push UI image
        if: needs.check-version.outputs.ui-docker-changed == 'true'
        uses: docker/build-push-action@v7
        with:
          file: docker/Dockerfile.ui
          push: true
          platforms: linux/amd64,linux/arm64
          tags: contfu/client:latest,contfu/client:${{ needs.check-version.outputs.ui-version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: Build CI Images

on: workflow_dispatch

jobs:
  # Build custom service images needed for E2E testing
  build-ci-runner-image:
    name: Build CI Runner Image
    runs-on: [self-hosted, linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Build CI Runner
        run: docker build -t forgejo.rogge.vip/contfu/ci-runner:latest -f docker/ci-runner/Dockerfile .
      - name: Push CI Runner
        run: docker push forgejo.rogge.vip/contfu/ci-runner:latest


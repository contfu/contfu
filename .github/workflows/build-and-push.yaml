name: Build and Push
on:
  push:
    branches:
      - main
env:
  IMAGE_NAME: contfu-app
jobs:
  check-version:
    name: Check if version changed
    runs-on: ubuntu-latest
    outputs:
      app-changed: ${{ steps.check.outputs.app-changed }}
      app-version: ${{ steps.check.outputs.app-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check if package.json version changed
        id: check
        shell: bash
        run: |
          function get_version() {
            local package_path=$1
            if [ -f "$package_path" ]; then
              jq -r .version "$package_path" || echo "0.0.0"
            else
              echo "0.0.0"
            fi
          }

          CURRENT_APP_VERSION=$(get_version "packages/service/app/package.json")
          git checkout HEAD^
          PREVIOUS_APP_VERSION=$(get_version "packages/service/app/package.json")

          app_changed=$([ "$CURRENT_APP_VERSION" != "$PREVIOUS_APP_VERSION" ] && echo "true" || echo "false")
          echo "app-changed=$app_changed" >> "$GITHUB_OUTPUT"
          echo "app-version=$CURRENT_APP_VERSION" >> "$GITHUB_OUTPUT"
  push:
    needs: check-version
    if: needs.check-version.outputs.app-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1
      - name: Set up Docker Buildx
        id: builder
        uses: docker/setup-buildx-action@v1
      - name: Log in to registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build and push image
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME
          VERSION=${{ needs.check-version.outputs.app-version }}
          docker buildx build --push --platform linux/arm64,linux/amd64 . --tag $IMAGE_ID:$VERSION --label "runnumber=${GITHUB_RUN_ID}"

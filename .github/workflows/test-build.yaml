name: Test and Build

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 10
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Generate SvelteKit types
        run: |
          for dir in packages/service/app packages/client/app demos/consumer-app; do
            (cd $dir && bun svelte-kit sync)
          done

      - name: Lint (type-aware)
        run: bun run lint:types

      - name: Run unit tests
        run: bun run test

  # Build custom service images needed for E2E testing
  # build-ci-runner-image:
  #   name: Build CI Runner Image
  #   runs-on: [self-hosted, linux, X64]
  #   steps:
  #     - uses: actions/checkout@v4

  #     - name: Build CI Runner
  #       run: docker build -t forgejo.rogge.vip/contfu/ci-runner:latest -f docker/ci-runner/Dockerfile .
  #     - name: Push CI Runner
  #       run: docker push forgejo.rogge.vip/contfu/ci-runner:latest
  # build-nats-jetstream-image:
  #   name: Build NATS with JetStream Image
  #   runs-on: [self-hosted, linux, X64]
  #   steps:
  #     - uses: actions/checkout@v4

  #     - name: Build NATS with JetStream
  #       working-directory: docker/nats-jetstream
  #       run: docker build -t forgejo.rogge.vip/contfu/nats-jetstream:latest .
  #     - name: Push NATS with JetStream
  #       run: docker push forgejo.rogge.vip/contfu/nats-jetstream:latest
  # build-strapi-test-image:
  #   name: Build Strapi Test Image
  #   runs-on: [self-hosted, linux, X64]
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Build Strapi test
  #       working-directory: docker/strapi-test
  #       run: docker build -t forgejo.rogge.vip/contfu/strapi-test:latest .
  #     - name: Push Strapi with JetStream
  #       run: docker push forgejo.rogge.vip/contfu/strapi-test:latest

  e2e:
    name: Build & E2E Tests
    runs-on: [self-hosted, linux, X64]
    # needs:
    #   - build-ci-runner-image
    #   - build-nats-jetstream-image
    #   - build-strapi-test-image
    timeout-minutes: 20

    # Run job in a container to enable automatic service networking
    container:
      image: forgejo.rogge.vip/contfu/ci-runner:latest

    # Service containers run alongside the job container
    # They are automatically networked and accessible via their service name
    services:
      nats:
        image: forgejo.rogge.vip/contfu/nats-jetstream:latest
        options: >-
          --health-cmd "wget --spider -q http://localhost:8222/healthz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # GitHub Actions overrides HOME to /github/home inside containers,
      # but the CI runner image installed tools (Playwright, Bun) under /root.
      HOME: /root
      E2E_FULL_FLOW: true
      NATS_SERVER: nats://nats:4222
      CI: true

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build all packages
        run: bun run build

      - name: Build consumer demo app
        run: bun run build
        working-directory: demos/consumer-app

      - name: Run E2E tests
        run: bun run test:e2e:no-build --reporter=list
        env:
          DEBUG: pw:api
          PWDEBUG: 0

  build:
    name: Build Docker image
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4
      - run: docker build .

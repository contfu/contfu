name: Test and Build

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 5
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Generate SvelteKit types
        run: |
          for dir in packages/service/app packages/client/app demos/consumer-app; do
            (cd $dir && bun svelte-kit sync)
          done

      - name: Lint (type-aware)
        run: bun run lint:types

      - name: Run unit tests
        run: bun run test

  e2e:
    name: Build & E2E Tests
    runs-on: [self-hosted, linux, X64]
    # needs:
    #   - build-ci-runner-image
    #   - build-nats-jetstream-image
    timeout-minutes: 20

    # Run job in a container to enable automatic service networking
    container:
      image: registry.sven-rogge.com/contfu/ci-runner:latest

    # Service containers run alongside the job container
    # They are automatically networked and accessible via their service name
    services:
      nats:
        image: registry.sven-rogge.com/contfu/nats-jetstream:latest
        options: >-
          --health-cmd "wget --spider -q http://localhost:8222/healthz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      E2E_FULL_FLOW: true
      NATS_SERVER: nats://nats:4222
      CI: true
      PLAYWRIGHT_BROWSERS_PATH: /opt/ms-playwright

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build

      - name: Build consumer demo app
        run: bun run build
        working-directory: demos/consumer-app

      - name: Run E2E tests
        run: bun run test:e2e:no-build --reporter=list
        env:
          PLAYWRIGHT_HTML_OPEN: never

  build:
    name: Build Docker image
    timeout-minutes: 8
    runs-on: [self-hosted, linux, X64]
    steps:
      - uses: actions/checkout@v4
      - run: docker build .

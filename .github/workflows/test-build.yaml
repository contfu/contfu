name: Test and Build

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 10
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Generate SvelteKit types
        run: |
          for dir in packages/service/app packages/client/app demos/consumer-app; do
            (cd $dir && bun svelte-kit sync)
          done

      - name: Lint (type-aware)
        run: bun run lint:types

      - name: Run unit tests
        run: bun run test

  e2e:
    name: Build & E2E Tests
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 20
    env:
      E2E_FULL_FLOW: true
      STRAPI_HOST: localhost
      NATS_SERVER: nats://localhost:4222
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Start NATS service
        run: |
          docker run -d --name nats-e2e \
            -p 4222:4222 \
            -p 8222:8222 \
            nats:2.12-linux --jetstream -m 8222

      - name: Start Strapi service
        run: |
          docker run -d --name strapi-e2e \
            -p 1337:1337 \
            -e NODE_ENV=development \
            -e HOST=0.0.0.0 \
            -e PORT=1337 \
            -e APP_KEYS=testkey1,testkey2 \
            -e API_TOKEN_SALT=testsalt1 \
            -e ADMIN_JWT_SECRET=testsecret1 \
            -e TRANSFER_TOKEN_SALT=testsalt2 \
            -e JWT_SECRET=testsecret2 \
            forgejo.rogge.vip/contfu/strapi-test:v2

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build all packages
        run: bun run build

      - name: Build consumer demo app
        run: bun run build
        working-directory: demos/consumer-app

      - name: Wait for services
        run: |
          echo "Waiting for NATS..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:8222/healthz > /dev/null 2>&1 && break
            sleep 1
          done
          echo "Waiting for Strapi..."
          for i in $(seq 1 60); do
            curl -sf http://localhost:1337/_health > /dev/null 2>&1 && exit 0
            sleep 2
          done
          docker logs strapi-e2e && exit 1

      - name: Run E2E tests
        run: DEBUG=pw:api bun run test:e2e --reporter=list
        env:
          PWDEBUG: 0

      - name: Cleanup
        if: always()
        run: |
          docker stop strapi-e2e nats-e2e || true
          docker rm strapi-e2e nats-e2e || true

  build:
    name: Build Docker image
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4
      - run: docker build .

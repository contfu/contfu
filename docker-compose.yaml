services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    ports:
      - "3000:3000"
    volumes:
      - ./local-db:/app/db
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3001:3000"
    volumes:
      - ./local-db:/app/db

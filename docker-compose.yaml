services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: contfu
      POSTGRES_PASSWORD: contfu
      POSTGRES_DB: contfu
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contfu"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.12-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "--store_dir", "/data"]
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://contfu:contfu@postgres:5432/contfu
      NATS_SERVER: nats://nats:4222
      POLAR_ACCESS_TOKEN: ${POLAR_ACCESS_TOKEN:-}
      POLAR_SANDBOX: ${POLAR_SANDBOX:-true}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      ORIGIN: http://localhost:3001
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  strapi:
    image: naskio/strapi:latest-alpine
    profiles:
      - strapi
      - demo
    environment:
      NODE_ENV: development
      DATABASE_CLIENT: sqlite
      HOST: 0.0.0.0
      PORT: 1337
      JWT_SECRET: test-jwt-secret
      ADMIN_JWT_SECRET: test-admin-jwt-secret
      APP_KEYS: key1,key2,key3,key4
      API_TOKEN_SALT: test-api-token-salt
      TRANSFER_TOKEN_SALT: test-transfer-salt
    ports:
      - "1337:1337"
    volumes:
      - strapi-data:/app/.tmp
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:1337/_health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5

  demo-app:
    build:
      context: .
      dockerfile: demos/consumer-app/Dockerfile
    profiles:
      - demo
    ports:
      - "4001:4000"
    environment:
      PORT: 4000
      CONTFU_URL: ws://app:3000/contfu
      CONTFU_KEY: ${CONTFU_KEY:-}
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

volumes:
  pgdata:
  natsdata:
  strapi-data:

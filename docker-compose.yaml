services:
  migrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    environment:
      - DATABASE_SYNC_URL=http://sqld:8080
    volumes:
      - ./data/local:/data
  sync:
    build:
      context: .
      dockerfile: Dockerfile
      target: sync
    depends_on:
      migrator:
        condition: service_completed_successfully
    environment:
      - DATABASE_SYNC_URL=http://sqld:8080
    ports:
      - "3000:3000"
    volumes:
      - ./data/local:/data
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    depends_on:
      migrator:
        condition: service_completed_successfully
      sync:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      - DATABASE_SYNC_URL=http://sqld:8080
    volumes:
      - ./data/local:/data
  sqld:
    image: ghcr.io/tursodatabase/libsql-server:3f5ccae
    environment:
      SQLD_NODE: primary
    volumes:
      - ./data/sqld:/var/lib/sqld
    ports:
      - "8080:8080"
  strapi:
    image: naskio/strapi:5.30.1-alpine
    profiles:
      - strapi
    environment:
      DATABASE_CLIENT: sqlite
      DATABASE_FILENAME: .tmp/data.db
      JWT_SECRET: test-jwt-secret
      ADMIN_JWT_SECRET: test-admin-jwt-secret
      APP_KEYS: key1,key2,key3,key4
      API_TOKEN_SALT: test-api-token-salt
    ports:
      - "1337:1337"
    volumes:
      - strapi-data:/srv/app/.tmp

volumes:
  strapi-data:

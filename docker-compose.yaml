services:
  sync:
    build:
      context: .
      dockerfile: Dockerfile
      target: sync
    ports:
      - "3000:3000"
    volumes:
      - ./local-db:/app/db
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    depends_on:
      sync:
        condition: service_healthy
    ports:
      - "3001:3000"
    volumes:
      - ./local-db:/app/db

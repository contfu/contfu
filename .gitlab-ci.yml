image: oven/bun:1.1.34-slim

cache:
  paths:
    - node_modules/

stages:
  - check
  - publish
  - deploy

check:
  stage: check
  except:
    - main
  script:
    - bun install
    - bun run test
    - bun run build

dockerize-check:
  image: docker:27.3.1
  stage: check
  except:
    - main
  services:
    - docker:27.3.1-dind
  variables:
    IMAGE_TAG_BACKEND: $CI_REGISTRY_IMAGE:backend-$CI_COMMIT_REF_SLUG
    IMAGE_TAG_FRONTEND: $CI_REGISTRY_IMAGE:frontend-$CI_COMMIT_REF_SLUG
  script:
    - docker build -t $IMAGE_TAG_BACKEND --target backend .
    - docker build -t $IMAGE_TAG_FRONTEND --target frontend .

push:
  image: docker:27.3.1
  stage: publish
  only:
    - main
  services:
    - docker:27.3.1-dind
  variables:
    IMAGE_TAG_BACKEND: $CI_REGISTRY_IMAGE:backend-$CI_COMMIT_REF_SLUG
    IMAGE_TAG_FRONTEND: $CI_REGISTRY_IMAGE:frontend-$CI_COMMIT_REF_SLUG
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u $CI_REGISTRY_USER $CI_REGISTRY --password-stdin
    - docker build -t $IMAGE_TAG_BACKEND --target backend .
    - docker push $IMAGE_TAG_BACKEND
    - docker build -t $IMAGE_TAG_FRONTEND --target frontend .
    - docker push $IMAGE_TAG_FRONTEND
